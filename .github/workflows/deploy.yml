name: CD — Deploy to Production

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ser-api:latest
            ${{ secrets.DOCKER_USERNAME }}/ser-api:${{ github.sha }}

      # Deploy to Render (set RENDER_DEPLOY_HOOK in secrets)
      - name: Trigger Render deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          npm install
          npm run build

      # Deploy to Vercel (set VERCEL_TOKEN in secrets)
      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        working-directory: frontend
        run: |
          npm install -g vercel
          vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "✅ Deployment complete for commit ${{ github.sha }}"
          echo "Backend and frontend deployed successfully."